<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة الأقصى - تمريض</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <!-- البحث -->
        <div class="search-container">
            <input type="text" class="search-input" id="search" placeholder="🔍 ابحث عن مساق..." onkeyup="globalSearch(this.value)">
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div id="main"></div>
        
        <!-- التوقيع -->
        <div class="signature">
            <i class="fas fa-code"></i>
            <span class="engineer">مهندس</span>
            <span class="nader">نادر</span>
            <i class="fas fa-crown crown-icon"></i>
            <i class="fas fa-heart" style="color: #e74c3c;"></i>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="js/courses-data.js"></script>
    <script src="js/security.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
